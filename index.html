<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS 자격증 모의시험</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:#f0f2f5;color:#333;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
.header{text-align:center;margin-bottom:50px}
.header h1{font-size:2em;color:#232f3e;margin-bottom:10px}
.header p{color:#666;font-size:1.1em}
.cards{display:flex;gap:30px;flex-wrap:wrap;justify-content:center;padding:0 20px}
.card{background:#fff;border-radius:16px;padding:40px 30px;width:320px;box-shadow:0 4px 15px rgba(0,0,0,.1);cursor:pointer;transition:all .3s;text-decoration:none;color:inherit;text-align:center}
.card:hover{transform:translateY(-8px);box-shadow:0 12px 30px rgba(0,0,0,.18)}
.card-icon{font-size:4em;margin-bottom:20px}
.card h2{font-size:1.3em;margin-bottom:8px}
.card .code{font-size:.85em;font-weight:700;padding:4px 12px;border-radius:20px;display:inline-block;margin-bottom:15px}
.card p{color:#666;font-size:.95em;line-height:1.6}
.card .count{margin-top:15px;font-size:.85em;font-weight:600}
.card-ai{border-top:4px solid #ff9900}
.card-ai .code{background:#fff3e0;color:#e65100}
.card-ai .count{color:#ff9900}
.card-net{border-top:4px solid #42a5f5}
.card-net .code{background:#e3f2fd;color:#1565c0}
.card-net .count{color:#42a5f5}
</style>
</head>
<body>
<div class="header">
  <h1>☁️ AWS 자격증 모의시험</h1>
  <p>시험을 선택하세요</p>
</div>
<div class="cards">
  <a class="card card-ai" href="/ai/index.html">
    <div class="card-icon">🤖</div>
    <span class="code">AIP-C01</span>
    <h2>AI Practitioner</h2>
    <p>AWS Certified AI Practitioner 자격증 대비 모의시험</p>
    <div class="count">📋 문제 풀기 →</div>
  </a>
  <a class="card card-net" href="/network/index.html">
    <div class="card-icon">🌐</div>
    <span class="code">ANS-C01</span>
    <h2>Advanced Networking</h2>
    <p>AWS Certified Advanced Networking Specialty 자격증 대비 모의시험</p>
    <div class="count">📋 272문제 풀기 →</div>
  </a>
</div>
<script>
(function() {
})();
</script>
</body>
</html>
